name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python package
        run: python -m pip install -e python
      - name: Run Python tests
        run: PYTHONPATH=python/src python -m unittest discover -s python/tests

  r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install testthat
        run: Rscript -e 'install.packages("testthat", repos = "https://cloud.r-project.org")'
      - name: Run R tests
        run: Rscript -e 'testthat::test_local("r/causalCalibration")'

  parity:
    runs-on: ubuntu-latest
    needs: [python, r]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
      - name: Install Python package
        run: python -m pip install -e python
      - name: Install testthat
        run: Rscript -e 'install.packages("testthat", repos = "https://cloud.r-project.org")'
      - name: Run shared-fixture tests
        run: |
          PYTHONPATH=python/src python -m unittest discover -s python/tests
          Rscript -e 'testthat::test_local("r/causalCalibration")'

  docs:
    runs-on: ubuntu-latest
    needs: [python, r]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Install R vignette dependencies
        run: Rscript -e 'install.packages(c("knitr","rmarkdown"), repos = "https://cloud.r-project.org")'
      - name: Execute Python docs tests
        run: PYTHONPATH=python/src python -m unittest discover -s python/tests -p 'test_docs.py'
      - name: Execute R vignette chunks
        run: |
          python docs/check_rmd_chunks.py r/causalCalibration/vignettes/getting-started.Rmd /tmp/causalCalibration-vignette-check.R
          Rscript /tmp/causalCalibration-vignette-check.R
      - name: Render Quarto docs
        run: quarto render docs
