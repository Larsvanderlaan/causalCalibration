name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python package
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          python -m pip install numpy scipy scikit-learn lightgbm matplotlib
          python -m pip install -e python
      - name: Build Python distribution
        run: python -m build python
      - name: Editable install smoke test
        run: python -c 'import causal_calibration; from causal_calibration import fit_calibrator, fit_cross_calibrator, diagnose_calibration, assess_overlap'
      - name: Run Python tests
        run: PYTHONPATH=python/src python -m unittest discover -s python/tests

  r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
      - name: Install Python dependencies
        run: python -m pip install -e 'python[plot]'
      - name: Source install smoke test without reticulate
        run: |
          R CMD INSTALL r/causalCalibration
          Rscript -e 'library(causalCalibration); stopifnot(is.function(fit_calibrator), is.function(fit_cross_calibrator), is.function(diagnose_calibration))'
      - name: Install R test dependencies
        run: Rscript -e 'install.packages(c("testthat","reticulate"), repos = "https://cloud.r-project.org"); stopifnot(requireNamespace("testthat", quietly = TRUE), requireNamespace("reticulate", quietly = TRUE))'
      - name: Run R tests
        env:
          RETICULATE_PYTHON: ${{ env.pythonLocation }}/bin/python
        run: Rscript -e 'testthat::test_local("r/causalCalibration")'
      - name: Optional isotonic smoke test
        env:
          RETICULATE_PYTHON: ${{ env.pythonLocation }}/bin/python
        run: |
          Rscript -e 'library(causalCalibration); fit <- fit_calibrator(predictions = c(0.1, 0.2, 0.3, 0.4), treatment = c(0, 1, 0, 1), outcome = c(0.2, 0.8, 0.3, 1.0), mu0 = c(0.1, 0.2, 0.2, 0.3), mu1 = c(0.3, 0.9, 0.4, 1.1), propensity = c(0.4, 0.6, 0.45, 0.55), method = "isotonic", method_options = list(min_child_samples = 1L)); stopifnot(length(predict(fit, c(0.15, 0.35))) == 2L)'

  parity:
    runs-on: ubuntu-latest
    needs: [python, r]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
      - name: Install Python package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install numpy scipy scikit-learn lightgbm matplotlib
          python -m pip install -e python
      - name: Install R dependencies
        run: Rscript -e 'install.packages("testthat", repos = "https://cloud.r-project.org"); stopifnot(requireNamespace("testthat", quietly = TRUE))'
      - name: Run shared-fixture tests
        env:
          RETICULATE_PYTHON: ${{ env.pythonLocation }}/bin/python
        run: |
          PYTHONPATH=python/src python -m unittest discover -s python/tests
          Rscript -e 'testthat::test_local("r/causalCalibration")'

  docs:
    runs-on: ubuntu-latest
    needs: [python, r]
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
      - uses: quarto-dev/quarto-actions/setup@v2
      - uses: actions/configure-pages@v5
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      - name: Install Python docs dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install numpy scipy scikit-learn lightgbm matplotlib
          python -m pip install -e python
      - name: Install R vignette dependencies
        run: Rscript -e 'install.packages(c("knitr","rmarkdown"), repos = "https://cloud.r-project.org"); stopifnot(requireNamespace("knitr", quietly = TRUE), requireNamespace("rmarkdown", quietly = TRUE))'
      - name: Install R package for vignette execution
        run: |
          mkdir -p /tmp/r-lib-docs
          R CMD INSTALL -l /tmp/r-lib-docs r/causalCalibration
      - name: Execute Python docs tests
        run: PYTHONPATH=python/src python -m unittest discover -s python/tests -p 'test_docs.py'
      - name: Execute R vignette chunks
        env:
          RETICULATE_PYTHON: ${{ env.pythonLocation }}/bin/python
          R_LIBS_USER: /tmp/r-lib-docs
        run: |
          python docs/check_rmd_chunks.py r/causalCalibration/vignettes/getting-started.Rmd /tmp/causalCalibration-vignette-check.R
          Rscript /tmp/causalCalibration-vignette-check.R
      - name: Render Quarto docs
        run: quarto render docs
      - name: Stage Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/causalCalibration-pages
          cp docs/index.html /tmp/causalCalibration-pages/index.html
          cp docs/site.css /tmp/causalCalibration-pages/site.css
          cp -R docs/assets /tmp/causalCalibration-pages/assets
          cp -R docs/_site /tmp/causalCalibration-pages/_site
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/causalCalibration-pages

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docs]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
